[build-system]\nrequires = ["setuptools>=45", "wheel", "setuptools_scm[toml]>=6.2"]\nbuild-backend = "setuptools.build_meta"\n\n[project]\nname = "zynex-autonomous-ai"\nversion = "1.0.0"\ndescription = "ZYNEX Autonomous AI is a multi-domain autonomous intelligence platform designed to perform advanced reasoning, intelligent data processing, secure storage, and AI-powered automation across multiple technology and engineering domains."\nreadme = "README.md"\nrequires-python = ">=3.9"\nlicense = {text = "MIT"}\nauthors = [\n    {name = "ZYNEX AI Team", email = "support@zynex-ai.com"}\n]\nkeywords = ["ai", "autonomous", "intelligence", "fastapi", "machine-learning"]\nclassifiers = [\n    "Development Status :: 4 - Beta",\n    "Environment :: Web Environment",\n    "Intended Audience :: Developers",\n    "Intended Audience :: Science/Research",\n    "License :: OSI Approved :: MIT License",\n    "Operating System :: OS Independent",\n    "Programming Language :: Python :: 3",\n    "Programming Language :: Python :: 3.9",\n    "Programming Language :: Python :: 3.10",\n    "Programming Language :: Python :: 3.11",\n    "Topic :: Internet :: WWW/HTTP :: Dynamic Content",\n    "Topic :: Scientific/Engineering :: Artificial Intelligence",\n]\n\ndependencies = [\n    "fastapi>=0.104.0",\n    "uvicorn[standard]>=0.24.0",\n    "pydantic>=2.0.0",\n    "pydantic-settings>=2.0.0",\n    "redis>=5.0.0",\n    "python-jose[cryptography]>=3.3.0",\n    "passlib[bcrypt]>=1.7.4",\n    "cryptography>=41.0.0",\n    "numpy>=1.24.0",\n    "pandas>=2.0.0",\n    "aiofiles>=23.0.0",\n    "python-multipart>=0.0.6",\n    "requests>=2.31.0",\n    "sqlalchemy>=2.0.0",\n    "alembic>=1.12.0",\n    "python-dotenv>=1.0.0",\n]  \n\n[project.optional-dependencies]\ndev = [\n    "pytest>=7.4.0",\n    "pytest-cov>=4.1.0",\n    "pytest-asyncio>=0.21.0",\n    "black>=23.0.0",\n    "flake8>=6.0.0",\n    "mypy>=1.5.0",\n    "isort>=5.12.0",\n    "pylint>=2.17.0",\n]\n\nml = [\n    "tensorflow>=2.13.0",\n    "torch>=2.0.0",\n    "scikit-learn>=1.3.0",\n    "nltk>=3.8.0",\n    "spacy>=3.6.0",\n]\n\ncloud = [\n    "boto3>=1.28.0",\n    "azure-storage-blob>=12.17.0",\n    "google-cloud-storage>=2.10.0",\n]\n\ndocs = [\n    "sphinx>=7.0.0",\n    "sphinx-rtd-theme>=1.3.0",\n    "sphinx-autodoc-typehints>=1.24.0",\n]\n\n[project.urls]\nHomepage = "https://github.com/zynex-autonomous-ai/Zynex-autonomous-ai-"\nDocumentation = "https://github.com/zynex-autonomous-ai/Zynex-autonomous-ai-/docs"\nRepository = "https://github.com/zynex-autonomous-ai/Zynex-autonomous-ai-.git"\n"Bug Tracker" = "https://github.com/zynex-autonomous-ai/Zynex-autonomous-ai-/issues"\n\n[tool.setuptools]\npackages = ["zynex"]\n\n[tool.black]\nline-length = 100\ntarget-version = ['py39', 'py310', 'py311']\ninclude = '\\.pyi?$'\nextend-exclude = '''\n/(\n  # directories\n  \\\.eggs\n  | \\\.git\n  | \\\.hg\n  | \\\.mypy_cache\n  | \\\.tox\n  | \\\.venv\n  | build\n  | dist\n)/\n'''\n\n[tool.isort]\nprofile = "black"\nline_length = 100\nskip_gitignore = true\nknown_first_party = ["zynex"]\n\n[tool.mypy]\npython_version = "3.9"\nwarn_return_any = true\nwarn_unused_configs = true\ndisallow_untyped_defs = false\nignore_missing_imports = true\n\n[tool.pytest.ini_options]\ntestpaths = ["tests"]\npython_files = ["test_*.py"]\naddopts = "--cov=zynex --cov-report=html --cov-report=term-missing"\nasyncio_mode = "auto"\n\n[tool.coverage.run]\nsource = ["zynex"]\nomit = [\n    "*/tests/*",\n    "*/test_*.py",\n    "*/__init__.py",\n]  \n\n[tool.pylint.messages_control]\ndisable = [\n    "C0111",  # missing-docstring\n    "R0913",  # too-many-arguments\n    "R0914",  # too-many-locals\n]\n\n[tool.pylint.format]\nmax-line-length = 100\n